# Variante per server con reverse proxy già presente sul host (es. Apache/nginx)
# e Docker/docker-compose datati (formato 2.3): solo il container dell'app,
# esposto su 127.0.0.1:8105. TLS e dominio sono gestiti dal proxy del host.
#
#   docker-compose -f compose.server.yaml up -d --build
version: "2.3"

services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - app-data:/app/data
    ports:
      - "127.0.0.1:8105:3000"

volumes:
  app-data:
